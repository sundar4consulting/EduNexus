version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: edunexus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: edunexus
      POSTGRES_USER: edunexus
      POSTGRES_PASSWORD: edunexus_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U edunexus']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edunexus-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: edunexus-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://edunexus:edunexus_pass@postgres:5432/edunexus
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production
      PORT: 5000
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    ports:
      - '5000:5000'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: edunexus-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '3000:80'

volumes:
  postgres_data:
  redis_data:
